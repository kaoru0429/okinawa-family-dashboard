<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>找洗手間與便利店 - 沖繩旅行助手</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="app-header" style="background-color: var(--success-color);">
        <a href="../index.html" class="back-btn">⬅</a>
        <h1 id="places-title">找洗手間與便利店</h1>
    </header>
    <main class="app-content">
        <!-- 過濾器 -->
        <div style="display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 8px;">
            <button class="btn btn-block" style="flex:1; margin:0;" onclick="filterPlaces('all')" id="btn-filter-all">全部</button>
            <button class="btn btn-block" style="flex:1; margin:0; background:#f0f8ff; color:var(--primary-color);" onclick="filterPlaces('toilet')" id="btn-filter-toilet">🚻 洗手間</button>
            <button class="btn btn-block" style="flex:1; margin:0; background:#f0f8ff; color:var(--primary-color);" onclick="filterPlaces('convenience')" id="btn-filter-convenience">🏪 便利店</button>
            <button class="btn btn-block" style="flex:1; margin:0; background:#f0f8ff; color:var(--primary-color);" onclick="filterPlaces('nursing')" id="btn-filter-nursing">🍼 哺乳室</button>
        </div>

        <div class="card" id="places-list">
            <div style="text-align:center;">載入中...</div>
        </div>
    </main>
    <script src="../js/app.js"></script>
    <script src="../js/geo.js"></script>
    <script>
        window.currentPlaceType = ['toilet', 'convenience', 'nursing'];
    </script>
    <script src="../js/places.js"></script>
</body>
</html>
