<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>緊急與醫療 - 沖繩旅行助手</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="app-header" style="background-color: var(--danger-color);">
        <a href="../index.html" class="back-btn">⬅</a>
        <h1>🆘 緊急醫療與求助</h1>
    </header>
    <main class="app-content">
        <div class="card">
            <div class="card-title" style="color:var(--danger-color);">一鍵呼叫</div>
            <div id="contacts-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <!-- JS 填入 -->
            </div>
        </div>

        <div class="card">
            <div class="card-title">附近醫院 (有小兒科)</div>
            <div id="hospitals-list">
                <!-- JS 填入 -->
            </div>
        </div>

        <div class="card">
            <div class="card-title">常用醫療日語發音</div>
            <div id="cards-list">
                <!-- JS 填入 -->
            </div>
        </div>

        <div class="card">
            <div class="card-title">💊 附近藥局</div>
            <div id="pharmacies-list">
                <!-- JS 填入 -->
            </div>
        </div>
    </main>
    <script src="../js/emergency.js"></script>
</body>
</html>
